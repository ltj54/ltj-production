<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sikringsskap visual</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #0a0e1a;
  }
  body {
    position: relative;
    display: grid;
    place-items: center;
  }
  .line {
    position: absolute;
    left: -70%;
    height: 1px;
    background: linear-gradient(90deg, transparent, #f97316, transparent);
    opacity: 0;
    animation: sweep 3s ease-in-out infinite;
  }
  .line:nth-child(1) { top: 16%; width: 60%; animation-delay: 0s; }
  .line:nth-child(2) { top: 34%; width: 44%; animation-delay: 0.6s; }
  .line:nth-child(3) { top: 58%; width: 70%; animation-delay: 1.2s; }
  .line:nth-child(4) { top: 78%; width: 50%; animation-delay: 1.8s; }
  .field {
    position: absolute;
    inset: 18% 8%;
    border: 1px solid rgba(249,115,22,0.1);
    background:
      linear-gradient(90deg, transparent 0 30%, rgba(249,115,22,0.07) 30.2% 30.6%, transparent 30.8% 69%, rgba(249,115,22,0.07) 69.2% 69.6%, transparent 69.8%),
      linear-gradient(0deg, transparent 0 44%, rgba(249,115,22,0.08) 44.2% 44.6%, transparent 44.8%);
    animation: fieldPulse 3s ease-in-out infinite;
  }
  .panel {
    position: relative;
    width: 170px;
    height: 220px;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    grid-template-rows: repeat(7, 1fr);
    gap: 6px;
    padding: 16px 14px;
    border: 2px solid rgba(249,115,22,0.3);
    border-radius: 6px;
    background: linear-gradient(160deg, #1a2035, #0d1220);
    animation: panelIn 1s cubic-bezier(0.22,1,0.36,1) forwards;
  }
  .breaker {
    position: relative;
    overflow: hidden;
    border: 1px solid rgba(148,163,184,0.15);
    border-radius: 3px;
    background: #1e293b;
    opacity: 0;
    animation: breakerLoad 0.4s ease forwards;
  }
  .breaker::after {
    position: absolute;
    top: 20%;
    left: 50%;
    width: 30%;
    height: 60%;
    content: "";
    border-radius: 2px;
    background: #334155;
    transform: translateX(-50%);
  }
  .breaker.on::after {
    background: #f97316;
    box-shadow: 0 0 8px rgba(249,115,22,0.35);
  }
  .breaker:nth-child(1) { animation-delay: 0.2s; }
  .breaker:nth-child(2) { animation-delay: 0.3s; }
  .breaker:nth-child(3) { animation-delay: 0.4s; }
  .breaker:nth-child(4) { animation-delay: 0.5s; }
  .breaker:nth-child(5) { animation-delay: 0.6s; }
  .breaker:nth-child(6) { animation-delay: 0.7s; }
  .breaker:nth-child(7) { animation-delay: 0.8s; }
  .breaker:nth-child(8) { animation-delay: 0.9s; }
  .breaker:nth-child(9) { animation-delay: 1s; }
  .breaker:nth-child(10) { animation-delay: 1.1s; }
  .breaker:nth-child(11) { animation-delay: 1.2s; }
  .breaker:nth-child(12) { animation-delay: 1.3s; }
  .breaker:nth-child(13) { animation-delay: 1.4s; }
  .breaker:nth-child(14) { animation-delay: 1.5s; }
  @keyframes sweep {
    0% { opacity: 0; transform: translateX(0); }
    20% { opacity: 0.6; }
    100% { opacity: 0; transform: translateX(900px); }
  }
  @keyframes fieldPulse {
    0%, 100% { opacity: 0.55; }
    50% { opacity: 1; }
  }
  @keyframes panelIn {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes breakerLoad {
    from { opacity: 0; transform: scaleY(0.5); }
    to { opacity: 1; transform: scaleY(1); }
  }
</style>
</head>
<body>
  <span class="line"></span>
  <span class="line"></span>
  <span class="line"></span>
  <span class="line"></span>
  <span class="field"></span>
  <div class="panel">
    <span class="breaker on"></span><span class="breaker on"></span>
    <span class="breaker"></span><span class="breaker on"></span>
    <span class="breaker on"></span><span class="breaker on"></span>
    <span class="breaker"></span><span class="breaker on"></span>
    <span class="breaker on"></span><span class="breaker on"></span>
    <span class="breaker on"></span><span class="breaker"></span>
    <span class="breaker on"></span><span class="breaker on"></span>
  </div>
<script>
  document.querySelectorAll('.breaker:not(.on)').forEach((breaker, index) => {
    setTimeout(() => {
      breaker.classList.add('on');
      setTimeout(() => breaker.classList.remove('on'), 800);
    }, 3200 + index * 300);
  });
</script>
</body>
</html>
